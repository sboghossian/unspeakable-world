<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#03050a" />
    <title>The Unspeakable World — every sky in a browser</title>
    <meta
      name="description"
      content="The first emotionally legible front-end to the entire Virtual Observatory. Every wavelength of every sky survey. In a browser. MIT licensed."
    />
    <meta property="og:title" content="The Unspeakable World" />
    <meta
      property="og:description"
      content="Every wavelength of every sky survey. Live ISS. Click any star and ask SIMBAD what it is. In a browser. MIT."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://unspeakable-world.dashable.dev" />
    <meta
      property="og:image"
      content="https://unspeakable-world.dashable.dev/og-card.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:image"
      content="https://unspeakable-world.dashable.dev/og-card.png"
    />
    <meta name="twitter:title" content="The Unspeakable World" />
    <meta
      name="twitter:description"
      content="Every wavelength of every sky survey. Live ISS. Click any star and ask SIMBAD what it is. In a browser. MIT."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Unspeakable" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <!--
      Self-hosted fonts. Google Fonts serves the same variable-axis woff2
      file for every weight in a family on the `latin` subset, so we ship
      one woff2 per family and let `font-weight` ranges pick the glyphs.
      Dropping 500 of Space Grotesk because Tailwind's `font-medium`
      callers (currently just AstronomyToday.tsx) fall through to 400/600
      cleanly on a variable axis.
      Preload only the family that's used above the fold (Space Grotesk
      for the landing display copy) — JetBrains Mono is for monospace
      labels deeper in the viewer chrome.
    -->
    <link
      rel="preload"
      href="/fonts/space-grotesk.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <style>
      @font-face {
        font-family: "Space Grotesk";
        font-style: normal;
        font-weight: 400 700;
        font-display: swap;
        src: url("/fonts/space-grotesk.woff2") format("woff2");
      }
      @font-face {
        font-family: "JetBrains Mono";
        font-style: normal;
        font-weight: 400 500;
        font-display: swap;
        src: url("/fonts/jetbrains-mono.woff2") format("woff2");
      }
    </style>
  </head>
  <body class="bg-space-950 text-white antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
